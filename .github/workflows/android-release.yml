name: Android Release

# Builds and uploads the release APK for an already-created GitHub Release.
# Example: gh release create v1.0.0 --target main --generate-notes
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          git fetch origin main
          TAG_NAME="${{ github.event.release.tag_name }}"
          TAG_SHA="$(git rev-list -n 1 "$TAG_NAME")"
          if ! git merge-base --is-ancestor "$TAG_SHA" origin/main; then
            echo "::error::Tags must point to a commit on the main branch."
            exit 1
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Add google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "::error::Repository secret GOOGLE_SERVICES_JSON_BASE64 is required."
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > app/google-services.json

      - name: Add upload keystore
        env:
          ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_UPLOAD_KEYSTORE_BASE64" ]; then
            echo "::error::Repository secret ANDROID_UPLOAD_KEYSTORE_BASE64 is required."
            exit 1
          fi
          echo "$ANDROID_UPLOAD_KEYSTORE_BASE64" | base64 -d > app/upload.keystore

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/app/upload.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
        run: |
          VERSION_NAME="${{ github.event.release.tag_name }}"
          VERSION_NAME="${VERSION_NAME#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION_NAME"
          VERSION_CODE=$((10#${MAJOR:-0} * 10000 + 10#${MINOR:-0} * 100 + 10#${PATCH:-0}))
          # Sideloaded GitHub APKs: debug App Check (Play Integrity does not apply). See scripts/ENABLE_AUTH.md
          ./gradlew :app:assembleRelease --no-daemon --stacktrace \
            -PversionCode="$VERSION_CODE" -PversionName="$VERSION_NAME" \
            -PuseDebugAppCheck=true

      - name: Prepare release asset
        run: |
          APK=$(ls app/build/outputs/apk/release/*.apk | head -1)
          cp "$APK" "rps-online-${{ github.event.release.tag_name }}.apk"

      - name: Upload APK to existing release
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$TAG_NAME" "rps-online-${TAG_NAME}.apk" --clobber
